{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Radares DGT</title>
    <link rel="stylesheet" href="{% static 'css/estilo.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.6/dist/sweetalert2.all.min.js"></script>
    <style>
    /* Bloqueamos a SweetAlert para que no aplaste el mapa de Leaflet */
    body.swal2-height-auto {
        height: 100vh !important;
    }

</head>
<body>

    <div class="contenedor-principal">

    </button>



    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
    <script> // Cogemos la infomación devuelta por el archivo views.py y la devolvemos al mapa.js
        const datosRadares = {{ radares_data|safe }}; // Mediante el safe protegemos el formato para que Django no lo altere
        const csrf_token = "{{ csrf_token }}";
        console.log(csrf_token)
        document.querySelector('#btn-localizar').addEventListener('click', () => {
            console.log("CENTRANDO MI POSICION");
            centrarEnMiPosicion();
        });
    </script>
    <script src="{% static 'js/mapa.js' %}"></script>

</body>
</html>
